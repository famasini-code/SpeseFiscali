/* ── CLOUDFLARE SERVICE ── */
class CloudflareService{
  constructor(){this.url=null;this.secret=null;}
 
  configure(url,secret){
    this.url=url?.replace(/\/$/,'');// rimuove trailing slash
    this.secret=secret;
    LS.set(KEY_CF_URL,url||'');
    LS.set(KEY_CF_SECRET,secret||'');
  }
 
  get configured(){return!!(this.url&&this.secret);}
 
  async req(path,method='GET',body=null){
    if(!this.configured)throw new Error('Cloudflare non configurato');
    const opts={method,headers:{'X-Secret':this.secret,'Content-Type':'application/json'}};
    if(body!==null)opts.body=typeof body==='string'?body:JSON.stringify(body);
    const res=await fetch(`${this.url}${path}`,opts);
    if(!res.ok){
      let msg=`HTTP ${res.status}`;
      try{const j=await res.json();msg=j.error||msg;}catch{}
      throw new Error(msg);
    }
    return res;
  }
 
  async saveExpenses(expenses){
    await this.req('/expenses','PUT',JSON.stringify(expenses));
  }
 
  async loadExpenses(){
    const res=await this.req('/expenses');
    return await res.json();
  }
 
  async saveDocument(expId,fileData){
    const payload=JSON.stringify({
      base64:fileData.base64,mediaType:fileData.mediaType,
      isPdf:fileData.isPdf,dataUrl:fileData.dataUrl||null
    });
    await this.req(`/doc/${expId}`,'PUT',payload);
  }
 
  async loadDocument(expId){
    try{
      const res=await this.req(`/doc/${expId}`);
      return await res.json();
    }catch(e){
      if(e.message.includes('404')||e.message.includes('Not found'))return null;
      throw e;
    }
  }
 
  async deleteDocument(expId){
    await this.req(`/doc/${expId}`,'DELETE');
  }
 
  // Test connessione: carica expenses, restituisce conteggio
  async testConnection(){
    const data=await this.loadExpenses();
    return Array.isArray(data)?data.length:0;
  }
}

/* ── CLAUDE API ── */
async function analyzeFile(base64,mediaType,apiKey){
  const isPdf=mediaType==="application/pdf";
  const block=isPdf
    ?{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}}
    :{type:"image",source:{type:"base64",media_type:mediaType,data:base64}};
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-opus-4-5",max_tokens:800,messages:[{role:"user",content:[
      block,
      {type:"text",text:`Analizza questo documento italiano (ricevuta/scontrino/fattura).
Cerca nel documento i codici fiscali: MSNFBA79P07C573G=Fabio, PNTMSS82S50C573K=Melissa, MSNLSN09S04H294X=Alessandro, MSNLRD15H16H294Q=Leonardo.
Rispondi SOLO con JSON valido, niente markdown:
{"beneficiario":"nome esercente/struttura","importo":0.00,"data":"YYYY-MM-DD","descrizione":"max 60 car","categoria":"salute|casa|istruzione|famiglia|veterinaria|erogazioni","sottocategoria":"id sottocategoria o null","cf_trovato":"codice fiscale trovato o null"}
Categorie e sottocategorie:
- salute: farmaci, visita_spec, ticket_ssn, occhiali, dispositivi, dentista, ricovero, psicologo
- casa: affitto, mutuo, ristrutturazione, risparmio_en, bonus_mobili
- istruzione: tasse_scolastiche, mensa, universita, sport, libri
- famiglia: assicurazione, badante, funebri, contributi_prev
- veterinaria: (nessuna sottocategoria, usa null)
- erogazioni: (nessuna sottocategoria, usa null)
Se non leggibile usa null per stringhe e 0 per importo.`}
    ]}]})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"Errore API");}
  const data=await res.json();
  const txt=data.content?.find(b=>b.type==="text")?.text||"{}";
  return JSON.parse(txt.replace(/```json|```/g,"").trim());
}
 
/* ── EXPORT ── */
function exportExcel(expenses,year){
  const rows=expenses.map(e=>({
    "Data":fmtDate(e.data),"Beneficiario":e.beneficiario,"Descrizione":e.descrizione,
    "Categoria":catLabel(e.categoria),
    "Tipo spesa":e.sottocategoria?subcatLabel(e.categoria,e.sottocategoria):"—",
    "Pagante":e.pagante,"Per chi":e.riferimento||e.pagante,
    "Tipo doc.":e.docType==="application/pdf"?"PDF":e.hasDoc?"Immagine":"—",
    "Importo €":Number(e.importo)
  }));
  const summary=CATS.map(c=>({
    "Categoria":catLabel(c.id),
    "N.":expenses.filter(e=>e.categoria===c.id).length,
    "Totale €":expenses.filter(e=>e.categoria===c.id).reduce((s,e)=>s+Number(e.importo),0)
  }));
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.json_to_sheet(rows);
  const ws2=XLSX.utils.json_to_sheet(summary);
  ws1["!cols"]=[12,28,35,18,18,10,12,10,12].map(w=>({wch:w}));
  ws2["!cols"]=[28,6,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws1,`Spese ${year}`);
  XLSX.utils.book_append_sheet(wb,ws2,"Riepilogo");
  XLSX.writeFile(wb,`SpeseFiscali_${year}.xlsx`);
}
 
function exportPDF(expenses,year){
  const byCat={};
  CATS.forEach(c=>{byCat[c.id]=expenses.filter(e=>e.categoria===c.id);});
  const totale=expenses.reduce((s,e)=>s+Number(e.importo),0);
  const sections=CATS.map(c=>{
    if(!byCat[c.id].length)return"";
    const tot=byCat[c.id].reduce((s,e)=>s+Number(e.importo),0);
    const rows=byCat[c.id].map(e=>`<tr><td>${fmtDate(e.data)}</td><td>${e.beneficiario||"—"}</td><td>${e.descrizione||"—"}</td><td>${e.pagante}</td><td>${e.riferimento||e.pagante}</td><td style="text-align:right;font-weight:600">${fmt(e.importo)}</td></tr>`).join("");
    return`<div class="sec"><h3>${c.icon} ${c.label}</h3><table><thead><tr><th>Data</th><th>Beneficiario</th><th>Descrizione</th><th>Pagante</th><th>Per chi</th><th>Importo</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="5" style="text-align:right;font-weight:700">Totale</td><td style="text-align:right;font-weight:700">${fmt(tot)}</td></tr></tfoot></table></div>`;
  }).join("");
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Spese Fiscali ${year}</title><style>body{font-family:Georgia,serif;max-width:960px;margin:40px auto;color:#1a2a1e}h1{font-size:26px;border-bottom:2px solid #1a2a1e;padding-bottom:8px}h2{font-size:12px;color:#666;font-weight:normal;letter-spacing:.1em;text-transform:uppercase}h3{font-size:15px;margin:28px 0 6px}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;padding:6px 8px;background:#f0ead8;border-bottom:2px solid #1a2a1e;font-size:10px;letter-spacing:.08em;text-transform:uppercase}td{padding:6px 8px;border-bottom:1px solid #ddd}tfoot td{background:#f8f5ef;font-size:13px}.sec{page-break-inside:avoid}.summary{margin-top:40px;border-top:2px solid #1a2a1e;padding-top:20px}.total{font-size:18px;font-weight:700;text-align:right}@media print{body{margin:20px}}</style></head><body><h1>Archivio Spese Fiscali — ${year}</h1><h2>Famiglia: ${FAMILY.join(" · ")} · ${new Date().toLocaleDateString("it-IT")}</h2>${sections}<div class="summary"><h3>Riepilogo</h3><table><thead><tr><th>Categoria</th><th>N.</th><th style="text-align:right">Totale</th></tr></thead><tbody>${CATS.map(c=>`<tr><td>${c.icon} ${c.label}</td><td>${byCat[c.id].length}</td><td style="text-align:right">${fmt(byCat[c.id].reduce((s,e)=>s+Number(e.importo),0))}</td></tr>`).join("")}</tbody></table><p class="total">TOTALE: ${fmt(totale)}</p></div></body></html>`;
  const w=window.open("","_blank");w.document.write(html);w.document.close();setTimeout(()=>w.print(),600);
}

          Dalla console su <span style={{color:C.gold,fontFamily:"'DM Mono',monospace",fontSize:10}}>console.anthropic.com</span> — salvata solo su questo dispositivo
        </p>
      </div>
      <button className="btn-primary" style={{...s.btn(),opacity:valid?1:.45,
        transition:"all .2s",boxShadow:valid?`0 6px 20px rgba(26,58,42,.3)`:"none"}}
        onClick={()=>{if(valid){LS.set(KEY_APIKEY,key);onSave(key);}}}>
        Continua →
      </button>
    </div>
  );
}
 
/* ── MAIN APP ── */
function App(){
  const[apiKey,setApiKey]=useState(()=>LS.get(KEY_APIKEY)?.value||null);
  const[expenses,setExpenses]=useState([]);
  const[page,setPage]=useState("registra");
  const[step,setStep]=useState("idle");
  const[fileData,setFileData]=useState(null);
  const[form,setForm]=useState({});
  const[err,setErr]=useState(null);
  const[toast,setToast]=useState(null);
  const[loading,setLoading]=useState(true);
  const[detail,setDetail]=useState(null);
  const[cfConfigured,setCfConfigured]=useState(()=>!!(LS.get(KEY_CF_URL)?.value&&LS.get(KEY_CF_SECRET)?.value));
  const[cfSyncing,setCfSyncing]=useState(false);
  const[duplicateWarning,setDuplicateWarning]=useState(null); // {suspects:[], onConfirm, onCancel}
  const[filterYear,setFilterYear]=useState(new Date().getFullYear().toString());
  const[filterCat,setFilterCat]=useState("all");
  const[filterPayer,setFilterPayer]=useState("all");
  const[filterRef,setFilterRef]=useState("all");
  const fileRef=useRef();
  const payers=PAYERS;
  const curYear=new Date().getFullYear().toString();
 
  const showToast=useCallback((msg,type="ok")=>{
    setToast({msg,type});setTimeout(()=>setToast(null),3000);
  },[]);
 
  // Inizializza Cloudflare — URL fisso, solo il secret viene da localStorage
  useEffect(()=>{
    const cfSec=LS.get(KEY_CF_SECRET)?.value;
    if(cfSec){
      cfService.configure(CF_WORKER_URL,cfSec);
      setCfConfigured(true);
      // Carica subito i dati aggiornati dal cloud
      cfService.loadExpenses()
        .then(data=>{
          if(data.length>0){
            setExpenses(data);
            LS.set(KEY_LS,JSON.stringify(data));
          }
        })
        .catch(()=>{}); // fallback silenzioso su localStorage già caricato
    }
  },[]);
 
 
  useEffect(()=>{
    const res=LS.get(KEY_LS);
    if(res?.value)try{setExpenses(JSON.parse(res.value));}catch{}
    setLoading(false);
  },[]);
 
  const syncFromCF=async()=>{
    if(!cfService.configured)return;
    setCfSyncing(true);
    try{
      const data=await cfService.loadExpenses();
      if(data.length>0){setExpenses(data);LS.set(KEY_LS,JSON.stringify(data));showToast(`Cloud: ${data.length} spese caricate`,"info");}
    }catch(e){showToast("Errore sync Cloud: "+e.message,"err");}
    finally{setCfSyncing(false);}
  };
 
  const persistExpenses=async(list)=>{
    LS.set(KEY_LS,JSON.stringify(list));
    // Cloudflare (priorità — condiviso tra dispositivi)
    if(cfService.configured){
      setCfSyncing(true);
      try{await cfService.saveExpenses(list);}
      catch(e){showToast("Cloud sync fallita: "+e.message,"err");}
      finally{setCfSyncing(false);}
    }
  };
 
  const handleFile=async e=>{
    const file=e.target.files[0];if(!file)return;
    const isPdf=file.type==="application/pdf";
    const base64=await toBase64(file);
    const dataUrl=isPdf?null:await toDataUrl(file);
    setFileData({base64,mediaType:file.type,dataUrl,isPdf});
    setStep(isPdf?"preview":"edit");e.target.value="";
  };
 
  const analyze=async()=>{
    setStep("loading");setErr(null);
    try{
      const r=await analyzeFile(fileData.base64,fileData.mediaType,apiKey);
      const cfUpper=(r.cf_trovato||"").toUpperCase().trim();
      const cfMatch=CF_MAP[cfUpper]||null;
      const detectedPagante=cfMatch?.type==="pagante"?cfMatch.name:null;
      const detectedRiferimento=cfMatch?cfMatch.name:null;
      setForm({beneficiario:r.beneficiario||"",importo:r.importo??"",
        data:r.data||new Date().toISOString().slice(0,10),
        descrizione:r.descrizione||"",categoria:r.categoria||"salute",
        sottocategoria:r.sottocategoria||null,
        pagante:detectedPagante||PAYERS[0],
        riferimento:detectedRiferimento||FAMILY[0],
        _cfRilevato:cfMatch?{name:cfMatch.name,type:cfMatch.type}:null});
      setStep("review");
    }catch(e){
      setErr("Errore AI: "+e.message);
      setForm({beneficiario:"",importo:"",data:new Date().toISOString().slice(0,10),
        descrizione:"",categoria:"salute",sottocategoria:null,pagante:PAYERS[0],riferimento:FAMILY[0]});
      setStep("review");
    }
  };
 
  // Trova duplicati: stesso importo + stessa categoria + data entro ±3 giorni
  const findDuplicates=(candidate,list)=>{
    const d0=new Date(candidate.data).getTime();
    return list.filter(e=>{
      if(!e.data)return false;
      const d1=new Date(e.data).getTime();
      const daysDiff=Math.abs(d0-d1)/(1000*60*60*24);
      return(
        Math.abs(Number(e.importo)-Number(candidate.importo))<0.01 &&
        e.categoria===candidate.categoria &&
        daysDiff<=3
      );
    });
  };
 
  const doSave=async()=>{
    if(!form.beneficiario||!form.importo)return;
    const id=Date.now();
    const newExp={...form,id,docType:fileData?.mediaType||null,hasDoc:!!fileData};
    if(fileData){
      try{LS.set(imgKey(id),JSON.stringify({dataUrl:fileData.dataUrl,base64:fileData.base64,mediaType:fileData.mediaType,isPdf:fileData.isPdf}));}catch{}
    }
    const updated=[newExp,...expenses];
    setExpenses(updated);
    await persistExpenses(updated);
    // Salva allegato su CF
    if(fileData){
      const saves=[];
      if(cfService.configured)saves.push(cfService.saveDocument(id,fileData).catch(()=>{}));
      if(saves.length)Promise.all(saves).then(()=>showToast("Spesa e allegato salvati ✓"));
      else showToast("Spesa salvata ✓");
    }else showToast("Spesa salvata ✓");
    setStep("idle");setFileData(null);setForm({});setPage("archivio");
  };
 
  const saveExpense=async()=>{
    if(!form.beneficiario||!form.importo)return;
    const suspects=findDuplicates(form,expenses);
    if(suspects.length>0){
      setDuplicateWarning({suspects,onConfirm:()=>{setDuplicateWarning(null);doSave();},onCancel:()=>setDuplicateWarning(null)});
      return;
    }
    await doSave();
  };
 
  const deleteExpense=async id=>{
    const updated=expenses.filter(e=>e.id!==id);
    setExpenses(updated);LS.del(imgKey(id));
    await persistExpenses(updated);
    if(cfService.configured)cfService.deleteDocument(id).catch(()=>{});
    showToast("Spesa eliminata","err");setDetail(null);
  };
 
  const years=[...new Set(expenses.map(e=>e.data?.slice(0,4)))].filter(Boolean).sort().reverse();
  const filtered=expenses.filter(e=>{
    const y=e.data?.slice(0,4)||curYear;
    return(filterYear==="all"||y===filterYear)&&(filterCat==="all"||e.categoria===filterCat)&&(filterPayer==="all"||e.pagante===filterPayer)&&(filterRef==="all"||e.riferimento===filterRef);
  });
  const total=filtered.reduce((s,e)=>s+Number(e.importo),0);
  const totalYear=expenses.filter(e=>e.data?.startsWith(curYear)).reduce((s,e)=>s+Number(e.importo),0);
 
  if(!apiKey)return<SetupScreen onSave={k=>setApiKey(k)}/>;
  if(loading)return(
    <div style={{...s.app,alignItems:"center",justifyContent:"center",background:C.bg}}>
      <div style={{fontSize:36,animation:"spin 1.2s linear infinite"}}>⚙️</div>
    </div>
  );
 
  return(
    <div style={s.app}>
      {toast&&<div style={s.toast(toast.type)}>{toast.msg}</div>}
 
      {/* ── MODALE DUPLICATO ── */}
      {duplicateWarning&&(
        <div style={{position:"fixed",inset:0,background:"rgba(28,25,23,.6)",
          zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center",
          backdropFilter:"blur(4px)",animation:"fadeIn .2s ease"}}>
          <div style={{background:C.card,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:430,
            padding:"24px 20px 36px",boxShadow:`0 -8px 40px ${C.shadowMd}`,
            animation:"fadeUp .25s ease"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
              <div style={{width:40,height:40,borderRadius:12,background:"#FFFBEB",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>⚠️</div>
              <div>
                <p style={{fontSize:15,fontWeight:"700",color:C.text,margin:0}}>Possibile duplicato</p>
                <p style={{fontSize:11,color:C.muted,margin:0,marginTop:2}}>
                  Trovata {duplicateWarning.suspects.length===1?"una spesa simile":"spese simili"} già registrata
                </p>
              </div>
            </div>
            <div style={{margin:"14px 0",display:"flex",flexDirection:"column",gap:8}}>
              {duplicateWarning.suspects.map(e=>(
                <div key={e.id} style={{background:C.goldLight,border:`1px solid ${C.gold}30`,
                  borderRadius:12,padding:"10px 14px",display:"flex",
                  justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:"600",color:C.text}}>{e.beneficiario||"—"}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>
                      {fmtDate(e.data)} · {catIcon(e.categoria)} {catLabel(e.categoria)} · {e.pagante}
                    </div>
                  </div>
                  <div style={{...s.number,color:C.gold,fontSize:16,fontWeight:"600"}}>{fmt(e.importo)}</div>
                </div>
              ))}
            </div>
            <p style={{fontSize:12,color:C.muted,marginBottom:16,lineHeight:1.5}}>
              Vuoi salvare comunque o annullare?
            </p>
            <button className="btn-primary" style={{...s.btn(),marginBottom:8,
              background:C.danger,boxShadow:`0 4px 14px rgba(185,28,28,.25)`}}
              onClick={duplicateWarning.onConfirm}>
              Salva comunque
            </button>
            <button className="btn-ghost" style={s.btn("ghost")} onClick={duplicateWarning.onCancel}>
              Annulla — rivedi la spesa
            </button>
          </div>
        </div>
      )}
 
      {/* ── HEADER ── */}
      <div style={s.header}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:10,background:C.green,
              display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🧾</div>
            <div>
              <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontWeight:600,fontSize:20,
                color:C.text,letterSpacing:"-0.02em",lineHeight:1}}>SpeseFiscali</h1>
              <div style={{display:"flex",alignItems:"center",gap:6,marginTop:2}}>
                <span style={{fontSize:10,color:C.muted,fontFamily:"'DM Mono',monospace"}}>Dichiarazione redditi</span>
                <span style={{width:4,height:4,borderRadius:"50%",
                  background:cfSyncing?C.gold:cfConfigured?C.success:C.border,
                  display:"inline-block",animation:cfSyncing?"pulse 1s infinite":undefined}}/>
              </div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:C.muted,fontFamily:"'DM Mono',monospace",marginBottom:2}}>{curYear}</div>
            <div style={{...s.number,fontSize:20,color:C.gold,letterSpacing:"-0.02em"}}>{fmt(totalYear)}</div>
            <button onClick={()=>{setPage("impostazioni");setDetail(null);}}
              style={{fontSize:10,color:C.mutedLight,background:"none",border:"none",cursor:"pointer",
                fontFamily:"'DM Mono',monospace",marginTop:2,padding:0}}>
              ⚙ impostazioni
            </button>
          </div>
        </div>
      </div>
 
      <div style={s.page}>
 
        {/* REGISTRA */}
        {page==="registra"&&<>
          {step==="idle"&&<>
            {/* Upload zone */}
            <div style={{background:`linear-gradient(135deg,${C.greenLight} 0%,#EBF5F0 100%)`,
              border:`2px dashed ${C.green}40`,borderRadius:22,padding:"30px 20px",
              textAlign:"center",marginBottom:16,cursor:"pointer"}}
              onClick={()=>fileRef.current.click()}>
              <div style={{fontSize:48,marginBottom:10}}>📄</div>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,color:C.green,
                fontWeight:600,margin:"0 0 4px"}}>Scatta o carica un documento</p>
              <p style={{fontSize:12,color:C.muted,lineHeight:1.6}}>
                Ricevuta · Scontrino · Fattura · PDF
              </p>
              <input ref={fileRef} type="file" accept="image/*,application/pdf"
                capture="environment" style={{display:"none"}} onChange={handleFile}/>
            </div>
            <button className="btn-primary" style={s.btn()} onClick={()=>fileRef.current.click()}>
              📷 &nbsp;Scatta foto / Carica file
            </button>
            <button className="btn-ghost" style={{...s.btn("ghost"),marginTop:8}} onClick={()=>{
              setStep("review");setFileData(null);
              setForm({beneficiario:"",importo:"",data:new Date().toISOString().slice(0,10),
                descrizione:"",categoria:"salute",sottocategoria:null,pagante:PAYERS[0],riferimento:FAMILY[0]});}}>
              ✏️ &nbsp;Inserimento manuale
            </button>
 
            {expenses.length>0&&<>
              <p style={{...s.label,marginTop:24,marginBottom:12}}>Recenti</p>
              {expenses.slice(0,5).map((e,i)=>(
                <div key={e.id} className="expense-card card-enter"
                  style={{...s.card,display:"flex",gap:12,alignItems:"center",cursor:"pointer",
                    animationDelay:`${i*0.06}s`}}
                  onClick={()=>{setDetail(e.id);setPage("archivio");}}>
                  <div style={{width:42,height:42,borderRadius:14,background:catBg(e.categoria),
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>
                    {catIcon(e.categoria)}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:"600",overflow:"hidden",textOverflow:"ellipsis",
                      whiteSpace:"nowrap",color:C.text}}>{e.beneficiario||"—"}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>
                      {fmtDate(e.data)} · {e.pagante}
                      {e.riferimento&&e.riferimento!==e.pagante&&
                        <span style={{color:C.info}}> → {e.riferimento}</span>}
                      {e.sottocategoria&&<span style={{color:catColor(e.categoria),marginLeft:4}}>· {subcatLabel(e.categoria,e.sottocategoria)}</span>}
                      {e.hasDoc&&<span style={{marginLeft:5,color:C.gold}}>
                        {e.docType==="application/pdf"?"📄":"🖼"}</span>}
                    </div>
                  </div>
                  <div style={{...s.number,color:C.gold,fontSize:16,whiteSpace:"nowrap",fontWeight:"600"}}>
                    {fmt(e.importo)}
                  </div>
                </div>
              ))}
            </>}
          </>}
 
          {step==="edit"&&fileData&&(
            <ImageEditor
              dataUrl={fileData.dataUrl}
              onConfirm={(newDataUrl)=>{
                const b64=newDataUrl.split(",")[1];
                setFileData(f=>({...f,dataUrl:newDataUrl,base64:b64}));
                setStep("preview");
              }}
              onCancel={()=>{setStep("idle");setFileData(null);}}
            />
          )}
 
          {step==="preview"&&fileData&&<>
            <p style={s.label}>Documento caricato</p>
            {fileData.isPdf
              ?<div style={{...s.card,textAlign:"center",padding:"36px",marginBottom:16,
                  background:`linear-gradient(135deg,#F0F9FF,#EFF6FF)`}}>
                  <div style={{fontSize:56,marginBottom:8}}>📄</div>
                  <p style={{color:C.info,fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:"500"}}>PDF pronto per analisi</p>
                </div>
              :<img src={fileData.dataUrl} alt="receipt" style={{width:"100%",borderRadius:16,
                  marginBottom:16,maxHeight:260,objectFit:"cover",
                  boxShadow:`0 4px 20px ${C.shadowMd}`}}/>
            }
            <button className="btn-primary" style={s.btn()} onClick={analyze}>
              ✨ &nbsp;Analizza con AI
            </button>
            <button className="btn-ghost" style={{...s.btn("ghost"),marginTop:8}}
              onClick={()=>{setStep("idle");setFileData(null);setErr(null);}}>Annulla</button>
          </>}
 
          {step==="loading"&&<div style={{textAlign:"center",padding:"80px 0"}}>
            <div style={{fontSize:44,marginBottom:16,animation:"spin 1.2s linear infinite"}}>⚙️</div>
            <p style={{color:C.muted,fontFamily:"'DM Mono',monospace",fontSize:12}}>Estrazione dati in corso…</p>
          </div>}
 
          {step==="review"&&<ReviewForm form={form} setForm={setForm} fileData={fileData}
            payers={payers} onSave={saveExpense} err={err}
            onCancel={()=>{setStep("idle");setFileData(null);setForm({});}}/>}
        </>}
 
        {/* ARCHIVIO */}
        {page==="archivio"&&!detail&&<>
          {/* Filters */}
          <div style={{marginBottom:12}}>
            <p style={s.label}>Anno</p>
            <div>
              {[...new Set([curYear,...years])].map(y=><span key={y} style={s.chip(filterYear===y,C.green,C.greenLight)} onClick={()=>setFilterYear(y)}>{y}</span>)}
              <span style={s.chip(filterYear==="all",C.muted)} onClick={()=>setFilterYear("all")}>Tutti</span>
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <p style={s.label}>Categoria</p>
            <div>
              <span style={s.chip(filterCat==="all",C.muted)} onClick={()=>setFilterCat("all")}>Tutte</span>
              {CATS.map(c=><span key={c.id} style={s.chip(filterCat===c.id,c.color,c.bg)} onClick={()=>setFilterCat(filterCat===c.id?"all":c.id)}>{c.icon} {c.label}</span>)}
            </div>
          </div>
          <div style={{marginBottom:12}}>
            <p style={s.label}>Pagante</p>
            <div>
              <span style={s.chip(filterPayer==="all",C.muted)} onClick={()=>setFilterPayer("all")}>Tutti</span>
              {payers.map(p=><span key={p} style={s.chip(filterPayer===p,C.gold,C.goldLight)} onClick={()=>setFilterPayer(filterPayer===p?"all":p)}>{p}</span>)}
            </div>
          </div>
          <div style={{marginBottom:18}}>
            <p style={s.label}>Per chi</p>
            <div>
              <span style={s.chip(filterRef==="all",C.muted)} onClick={()=>setFilterRef("all")}>Tutti</span>
              {FAMILY.map(f=><span key={f} style={s.chip(filterRef===f,C.info,C.infoLight)} onClick={()=>setFilterRef(filterRef===f?"all":f)}>{f}</span>)}
            </div>
          </div>
 
          {/* Totale */}
          <div style={{background:`linear-gradient(135deg,${C.green} 0%,${C.greenMid} 100%)`,
            borderRadius:18,padding:"18px 20px",marginBottom:16,
            boxShadow:`0 6px 24px rgba(26,58,42,.2)`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <p style={{...s.label,color:"rgba(255,255,255,.6)",margin:"0 0 2px"}}>
                  {filtered.length} spese · {filtered.filter(e=>e.hasDoc).length} allegati
                </p>
                <p style={{...s.number,fontSize:28,color:"#fff",letterSpacing:"-0.03em"}}>
                  {fmt(total)}
                </p>
              </div>
              <div style={{fontSize:32,opacity:.7}}>💰</div>
            </div>
          </div>
 
          {filtered.length===0&&<div style={{textAlign:"center",padding:"50px 20px"}}>
            <div style={{fontSize:40,marginBottom:12,opacity:.4}}>📋</div>
            <p style={{color:C.mutedLight,fontFamily:"'DM Mono',monospace",fontSize:12}}>Nessuna spesa trovata</p>
          </div>}
 
          {filtered.map((e,i)=>(
            <div key={e.id} className="expense-card card-enter"
              style={{...s.card,cursor:"pointer",animationDelay:`${i*0.04}s`}}
              onClick={()=>setDetail(e.id)}>
              <div style={{display:"flex",gap:12,alignItems:"center"}}>
                <div style={{width:44,height:44,borderRadius:14,background:catBg(e.categoria),
                  display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>
                  {catIcon(e.categoria)}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,fontWeight:"600",color:C.text}}>{e.beneficiario||"—"}</div>
                  <div style={{fontSize:11,color:C.muted,marginTop:2}}>
                    {fmtDate(e.data)} · {e.pagante}
                    {e.riferimento&&e.riferimento!==e.pagante&&
                      <span style={{color:C.info}}> → {e.riferimento}</span>}
                    {e.hasDoc&&<span style={{marginLeft:5,color:C.gold}}>
                      {e.docType==="application/pdf"?"📄":"🖼"}</span>}
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  <div style={{...s.number,color:C.gold,fontSize:17,fontWeight:"600"}}>{fmt(e.importo)}</div>
                  <div style={{fontSize:10,color:catColor(e.categoria),marginTop:3,fontWeight:"500"}}>
                    {e.sottocategoria?subcatLabel(e.categoria,e.sottocategoria):catLabel(e.categoria)}
                  </div>
                </div>
              </div>
              {e.descrizione&&<p style={{fontSize:12,color:C.muted,margin:"10px 0 0",
                lineHeight:1.4,paddingLeft:56}}>{e.descrizione}</p>}
            </div>
          ))}
        </>}
 
        {page==="archivio"&&detail&&(
          <DetailView expense={expenses.find(e=>e.id===detail)}
            onBack={()=>setDetail(null)} onDelete={deleteExpense}/>
        )}
 
        {page==="esporta"&&<ExportPage expenses={expenses} cfConfigured={cfConfigured} cfSyncing={cfSyncing}/>}
        {page==="impostazioni"&&(
          <ImpostazioniPage
            apiKey={apiKey} cfConfigured={cfConfigured} cfSyncing={cfSyncing}
            onSyncCF={syncFromCF}
            onSaveCF={(secret)=>{
              cfService.configure(CF_WORKER_URL,secret);
              setCfConfigured(!!secret);
              if(secret)syncFromCF();
            }}
            onDisconnectCF={()=>{
              LS.del(KEY_CF_URL);LS.del(KEY_CF_SECRET);
              cfService.url=null;cfService.secret=null;
              setCfConfigured(false);
            }}
            onResetApiKey={()=>{LS.del(KEY_APIKEY);setApiKey(null);}}
            expenseCount={expenses.length}/>
        )}

/* ── IMAGE EDITOR ── */
function ImageEditor({dataUrl,onConfirm,onCancel}){
  const canvasRef=useRef();
  const containerRef=useRef();
  const imgRef=useRef(new Image());
  const[rotation,setRotation]=useState(0);
  const[cropMode,setCropMode]=useState(false);
  const[cropRect,setCropRect]=useState(null);
  const[dragging,setDragging]=useState(false);
  const[dragStart,setDragStart]=useState(null);
  const[canvasSize,setCanvasSize]=useState({w:1,h:1});
 
  // Draw current image+rotation onto canvas
  const drawImage=useCallback((rot)=>{
    const canvas=canvasRef.current;
    const img=imgRef.current;
    if(!canvas||!img.naturalWidth)return;
    const rad=(rot??rotation)*Math.PI/180;
    const swap=(rot??rotation)%180!==0;
    const cw=swap?img.naturalHeight:img.naturalWidth;
    const ch=swap?img.naturalWidth:img.naturalHeight;
    canvas.width=cw;canvas.height=ch;
    setCanvasSize({w:cw,h:ch});
    const ctx=canvas.getContext("2d");
    ctx.clearRect(0,0,cw,ch);
    ctx.save();
    ctx.translate(cw/2,ch/2);
    ctx.rotate(rad);
    ctx.drawImage(img,-img.naturalWidth/2,-img.naturalHeight/2);
    ctx.restore();
    setCropRect(null);
  },[rotation]);
 
  useEffect(()=>{
    const img=imgRef.current;
    img.onload=()=>drawImage(0);
    img.src=dataUrl;
  },[]);
 
  const rotate=(deg)=>{
    const newRot=(rotation+deg+360)%360;
    setRotation(newRot);
    drawImage(newRot);
  };
 
  // Touch/mouse helpers — coords in canvas pixels
  const getCanvasPos=(e)=>{
    const canvas=canvasRef.current;
    const rect=canvas.getBoundingClientRect();
    const sx=canvas.width/rect.width;
    const sy=canvas.height/rect.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-rect.left)*sx, y:(src.clientY-rect.top)*sy};
  };
 
  const onPointerDown=(e)=>{
    if(!cropMode)return;
    e.preventDefault();
    const pos=getCanvasPos(e);
    setDragStart(pos);
    setCropRect({x:pos.x,y:pos.y,w:0,h:0});
    setDragging(true);
  };
  const onPointerMove=(e)=>{
    if(!dragging||!dragStart)return;
    e.preventDefault();
    const pos=getCanvasPos(e);
    const canvas=canvasRef.current;
    setCropRect({
      x:Math.max(0,Math.min(dragStart.x,pos.x)),
      y:Math.max(0,Math.min(dragStart.y,pos.y)),
      w:Math.min(Math.abs(pos.x-dragStart.x),canvas.width-Math.min(dragStart.x,pos.x)),
      h:Math.min(Math.abs(pos.y-dragStart.y),canvas.height-Math.min(dragStart.y,pos.y))
    });
  };
  const onPointerUp=()=>setDragging(false);
 
  // Overlay crop rect in display coordinates
  const cropOverlay=()=>{
    if(!cropRect||!canvasRef.current)return null;
    const canvas=canvasRef.current;
    const rect=canvas.getBoundingClientRect();
    const sx=rect.width/canvas.width;
    const sy=rect.height/canvas.height;
    return{
      left:cropRect.x*sx, top:cropRect.y*sy,
      width:cropRect.w*sx, height:cropRect.h*sy
    };
  };
 
  const applyAndConfirm=()=>{
    const canvas=canvasRef.current;
    if(cropMode&&cropRect&&cropRect.w>20&&cropRect.h>20){
      const out=document.createElement("canvas");
      out.width=Math.round(cropRect.w);out.height=Math.round(cropRect.h);
      out.getContext("2d").drawImage(canvas,
        Math.round(cropRect.x),Math.round(cropRect.y),
        Math.round(cropRect.w),Math.round(cropRect.h),
        0,0,Math.round(cropRect.w),Math.round(cropRect.h));
      onConfirm(out.toDataURL("image/jpeg",0.92));
    }else{
      onConfirm(canvas.toDataURL("image/jpeg",0.92));
    }
  };
 
  const ov=cropOverlay();
  const hasCrop=cropRect&&cropRect.w>20&&cropRect.h>20;
 
  return(
    <div style={{animation:"fadeUp .25s ease"}}>
      <p style={{...s.label,marginBottom:10}}>Modifica immagine</p>
 
      {/* Toolbar */}
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        <button onClick={()=>rotate(-90)} style={{flex:1,padding:"10px 8px",background:C.card,
          border:`1.5px solid ${C.border}`,borderRadius:12,cursor:"pointer",fontSize:13,
          fontWeight:"500",color:C.textSoft,display:"flex",alignItems:"center",
          justifyContent:"center",gap:6,boxShadow:`0 1px 4px ${C.shadow}`}}>
          ↺ Ruota sx
        </button>
        <button onClick={()=>rotate(90)} style={{flex:1,padding:"10px 8px",background:C.card,
          border:`1.5px solid ${C.border}`,borderRadius:12,cursor:"pointer",fontSize:13,
          fontWeight:"500",color:C.textSoft,display:"flex",alignItems:"center",
          justifyContent:"center",gap:6,boxShadow:`0 1px 4px ${C.shadow}`}}>
          Ruota dx ↻
        </button>
        <button onClick={()=>{setCropMode(m=>!m);if(cropMode)setCropRect(null);}}
          style={{flex:1,padding:"10px 8px",
            background:cropMode?C.green:C.card,
            border:`1.5px solid ${cropMode?C.green:C.border}`,borderRadius:12,
            cursor:"pointer",fontSize:13,fontWeight:"500",
            color:cropMode?"#fff":C.textSoft,
            display:"flex",alignItems:"center",justifyContent:"center",gap:6,
            boxShadow:`0 1px 4px ${C.shadow}`}}>
          ✂️ {cropMode?"Annulla ritaglia":"Ritaglia"}
        </button>
      </div>
 
      {cropMode&&<div style={{background:C.infoLight,border:`1px solid ${C.info}30`,
        borderRadius:10,padding:"8px 12px",marginBottom:10,fontSize:11,color:C.info,fontWeight:"500"}}>
        Trascina sull'immagine per selezionare l'area da ritagliare
      </div>}
 
      {/* Canvas container */}
      <div ref={containerRef} style={{position:"relative",width:"100%",
        borderRadius:14,overflow:"hidden",marginBottom:14,
        boxShadow:`0 4px 20px ${C.shadowMd}`,
        cursor:cropMode?"crosshair":"default",touchAction:cropMode?"none":"auto"}}>
        <canvas ref={canvasRef}
          style={{width:"100%",display:"block",userSelect:"none"}}
          onMouseDown={onPointerDown} onMouseMove={onPointerMove} onMouseUp={onPointerUp}
          onTouchStart={onPointerDown} onTouchMove={onPointerMove} onTouchEnd={onPointerUp}/>
        {/* Dark overlay outside crop rect */}
        {cropMode&&ov&&hasCrop&&<>
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.45)",pointerEvents:"none"}}/>
          <div style={{position:"absolute",
            left:ov.left,top:ov.top,width:ov.width,height:ov.height,
            border:"2px solid #fff",boxShadow:"0 0 0 9999px rgba(0,0,0,.45)",
            pointerEvents:"none",borderRadius:2}}/>
        </>}
      </div>
 
      <button className="btn-primary" style={s.btn()} onClick={applyAndConfirm}>
        {hasCrop?"✂️ Applica e continua":"✓ Conferma e continua"}
      </button>
      <button className="btn-ghost" style={{...s.btn("ghost"),marginTop:8}} onClick={onCancel}>Annulla</button>
    </div>
  );
}

/* ── EXPORT PAGE ── */
function ExportPage({expenses,cfConfigured,cfSyncing}){
  const curYear=new Date().getFullYear().toString();
  const years=[...new Set(expenses.map(e=>e.data?.slice(0,4)).filter(Boolean))].sort().reverse();
  const[year,setYear]=useState(years[0]||curYear);
  const byYear=expenses.filter(e=>e.data?.startsWith(year));
  const total=byYear.reduce((s,e)=>s+Number(e.importo),0);
 
  // Categorie intere mancanti (veterinaria, erogazioni e quelle senza sottocategorie)
  const missingCats=CATS.filter(c=>!subcatList(c.id).length&&!byYear.some(e=>e.categoria===c.id));
  // Sotto-categorie mancanti per categorie che le hanno
  const missingSubcats=[];
  CATS.forEach(c=>{
    const subs=subcatList(c.id);
    if(!subs.length)return;
    subs.forEach(sc=>{
      if(!byYear.some(e=>e.categoria===c.id&&e.sottocategoria===sc.id))
        missingSubcats.push({cat:c,sc});
    });
  });
 
  // Duplicati sospetti: coppie con stesso importo + categoria + data ±3gg
  const suspectPairs=[];
  for(let i=0;i<byYear.length;i++){
    for(let j=i+1;j<byYear.length;j++){
      const a=byYear[i],b=byYear[j];
      if(!a.data||!b.data)continue;
      const daysDiff=Math.abs(new Date(a.data)-new Date(b.data))/(1000*60*60*24);
      if(Math.abs(Number(a.importo)-Number(b.importo))<0.01&&a.categoria===b.categoria&&daysDiff<=3){
        // evita di aggiungere la stessa coppia due volte
        if(!suspectPairs.some(p=>(p[0].id===a.id&&p[1].id===b.id)||(p[0].id===b.id&&p[1].id===a.id)))
          suspectPairs.push([a,b]);
      }
    }
  }
 
  return(
    <>
      <p style={s.label}>Anno</p>
      <div style={{marginBottom:18}}>
        {[...new Set([curYear,...years])].map(y=><span key={y}
          style={s.chip(year===y,C.green,C.greenLight)} onClick={()=>setYear(y)}>{y}</span>)}
      </div>
 
      {/* Alert voci mancanti */}
      {byYear.length>0&&(missingCats.length>0||missingSubcats.length>0)&&(
        <div style={{background:C.goldLight,border:`1.5px solid ${C.gold}40`,
          borderRadius:16,padding:"14px 16px",marginBottom:16}}>
          <p style={{...s.label,color:C.gold,margin:"0 0 10px"}}>
            ⚠️ Voci senza spese — hai qualcosa da aggiungere?
          </p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {missingCats.map(c=>(
              <span key={c.id} style={{display:"inline-flex",alignItems:"center",gap:5,
                padding:"6px 12px",borderRadius:20,fontSize:11,fontWeight:"500",
                border:`1.5px solid ${c.color}40`,background:c.bg,color:c.color}}>
                {c.icon} {c.label}
              </span>
            ))}
            {missingSubcats.map(({cat,sc})=>(
              <span key={cat.id+sc.id} style={{display:"inline-flex",alignItems:"center",gap:5,
                padding:"6px 12px",borderRadius:20,fontSize:11,fontWeight:"500",
                border:`1.5px solid ${cat.color}40`,background:cat.bg,color:cat.color}}>
                {cat.icon} {sc.label}
              </span>
            ))}
          </div>
        </div>
      )}
 
      {/* Alert duplicati sospetti */}
      {suspectPairs.length>0&&(
        <div style={{background:C.dangerLight,border:`1.5px solid ${C.danger}30`,
          borderRadius:16,padding:"14px 16px",marginBottom:16}}>
          <p style={{...s.label,color:C.danger,margin:"0 0 10px"}}>
            🔁 {suspectPairs.length} possibil{suspectPairs.length===1?"e":"i"} duplicato{suspectPairs.length>1?"i":""} — verifica prima di esportare
          </p>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {suspectPairs.map(([a,b],i)=>(
              <div key={i} style={{background:"#fff",borderRadius:10,padding:"10px 12px",
                border:`1px solid ${C.danger}20`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  marginBottom:4}}>
                  <span style={{fontSize:10,color:C.danger,fontFamily:"'DM Mono',monospace",
                    fontWeight:"500",letterSpacing:"0.08em"}}>COPPIA {i+1}</span>
                  <span style={{...s.number,color:C.danger,fontSize:14,fontWeight:"600"}}>{fmt(a.importo)}</span>
                </div>
                <div style={{fontSize:12,color:C.textSoft,lineHeight:1.6}}>
                  <span style={{fontWeight:"600"}}>{a.beneficiario||"—"}</span> · {fmtDate(a.data)} · {a.pagante}<br/>
                  <span style={{fontWeight:"600"}}>{b.beneficiario||"—"}</span> · {fmtDate(b.data)} · {b.pagante}
                </div>
                <div style={{marginTop:4,fontSize:11,color:C.mutedLight}}>
                  {catIcon(a.categoria)} {catLabel(a.categoria)}
                  {a.pagante!==b.pagante&&<span style={{color:C.gold,marginLeft:6}}>⚠ paganti diversi</span>}
                </div>
              </div>
            ))}
          </div>
          <p style={{fontSize:11,color:C.muted,marginTop:10,marginBottom:0,lineHeight:1.5}}>
            Vai in Archivio per eliminare eventuali doppioni prima di esportare.
          </p>
        </div>
      )}
 
      {/* Riepilogo */}
      <div style={{...s.card,marginBottom:16}}>
        <p style={{...s.label,marginBottom:14}}>Riepilogo {year}</p>
        {CATS.map(c=>{
          const items=byYear.filter(e=>e.categoria===c.id);if(!items.length)return null;
          return<div key={c.id} style={{display:"flex",justifyContent:"space-between",
            alignItems:"center",paddingBottom:10,marginBottom:10,borderBottom:`1px solid ${C.border}`}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:28,height:28,borderRadius:8,background:c.bg,
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
                {c.icon}
              </div>
              <span style={{fontSize:13,color:C.textSoft,fontWeight:"500"}}>
                {c.label} <span style={{color:C.mutedLight,fontSize:11}}>({items.length})</span>
              </span>
            </div>
            <span style={{...s.number,color:c.color,fontSize:15,fontWeight:"600"}}>
              {fmt(items.reduce((s,e)=>s+Number(e.importo),0))}
            </span>
          </div>;
        })}
        {!byYear.length&&<p style={{color:C.muted,fontSize:13,textAlign:"center",padding:"8px 0"}}>
          Nessuna spesa per {year}
        </p>}
        {byYear.length>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:6}}>
          <span style={{fontSize:11,color:C.muted,fontFamily:"'DM Mono',monospace"}}>
            {byYear.length} spese · {byYear.filter(e=>e.hasDoc).length} allegati
          </span>
          <span style={{...s.number,color:C.gold,fontSize:22,fontWeight:"600"}}>{fmt(total)}</span>
        </div>}
      </div>
 
      <button className="btn-primary" style={{...s.btn(),marginBottom:8,opacity:byYear.length?1:.4}}
        onClick={byYear.length?()=>exportExcel(byYear,year):undefined}>
        📊 &nbsp;Esporta Excel (.xlsx)
      </button>
      <button className="btn-ghost" style={{...s.btn("secondary"),opacity:byYear.length?1:.4}}
        onClick={byYear.length?()=>exportPDF(byYear,year):undefined}>
        🖨️ &nbsp;Genera PDF archivio
      </button>
    </>
  );
}
 
function ImpostazioniPage({apiKey,cfConfigured,cfSyncing,
  onSyncCF,onSaveCF,onDisconnectCF,onResetApiKey,expenseCount}){
  const isServed=window.location.protocol!=="file:";
  const[cfSecret,setCfSecret]=useState(()=>LS.get(KEY_CF_SECRET)?.value||"");
  const[cfShowSecret,setCfShowSecret]=useState(false);
  const[cfTesting,setCfTesting]=useState(false);
  const[cfTestMsg,setCfTestMsg]=useState(null);
 
  const testAndSave=async()=>{
    if(!cfSecret)return;
    setCfTesting(true);setCfTestMsg(null);
    cfService.configure(CF_WORKER_URL,cfSecret);
    try{
      const n=await cfService.testConnection();
      setCfTestMsg({ok:true,msg:`Connessione riuscita — ${n} spese nel cloud`});
      LS.set(KEY_CF_SECRET,cfSecret);
      onSaveCF(cfSecret);
    }catch(e){
      setCfTestMsg({ok:false,msg:"Errore: "+e.message});
      const savedSec=LS.get(KEY_CF_SECRET)?.value||"";
      cfService.configure(CF_WORKER_URL,savedSec);
    }finally{setCfTesting(false);}
  };
 
  return(
    <>
      <p style={{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:600,
        color:C.text,marginBottom:20,letterSpacing:"-0.02em"}}>Impostazioni</p>
 
      {/* ── CLOUDFLARE ── */}
      <div style={{...s.card,marginBottom:14,borderLeft:`4px solid ${cfConfigured?C.success:C.border}`}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <div style={{width:42,height:42,borderRadius:13,
            background:cfConfigured?C.successLight:"#F5F5F5",
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>☁️</div>
          <div>
            <p style={{fontSize:14,fontWeight:"600",color:cfConfigured?C.success:C.textSoft,margin:"0 0 2px"}}>
              {cfConfigured?"Cloud sync — attivo":"Cloud sync"}
            </p>
            <p style={{fontSize:11,color:C.muted,margin:0,fontFamily:"'DM Mono',monospace"}}>
              {CF_WORKER_URL.replace("https://","")}
            </p>
          </div>
        </div>
 
        <div style={{marginBottom:12}}>
          <label style={s.label}>Password di accesso</label>
          <div style={{display:"flex",gap:8}}>
            <input style={{...s.input,flex:1}} type={cfShowSecret?"text":"password"}
              value={cfSecret} placeholder="La parola segreta del Worker"
              onChange={e=>setCfSecret(e.target.value.trim())}
              onFocus={e=>e.target.style.borderColor=C.green}
              onBlur={e=>e.target.style.borderColor=C.border}/>
            <button style={{background:C.surface,border:`1.5px solid ${C.border}`,borderRadius:12,
              width:46,cursor:"pointer",fontSize:16,color:C.muted,flexShrink:0}}
              onClick={()=>setCfShowSecret(p=>!p)}>{cfShowSecret?"🙈":"👁"}</button>
          </div>
        </div>
 
        {cfTestMsg&&<div style={{background:cfTestMsg.ok?C.successLight:C.dangerLight,
          border:`1px solid ${cfTestMsg.ok?C.success:C.danger}30`,
          borderRadius:10,padding:"10px 14px",marginBottom:12,
          fontSize:12,color:cfTestMsg.ok?C.success:C.danger,fontWeight:"500"}}>
          {cfTestMsg.ok?"✓":"✗"} {cfTestMsg.msg}
        </div>}
 
        <button className="btn-primary" style={{...s.btn(),marginBottom:8,
          opacity:(cfSecret&&!cfTesting)?1:.4}}
          onClick={(cfSecret&&!cfTesting)?testAndSave:undefined}>
          {cfTesting?"⟳ Verifica in corso…":"⬡ Connetti al cloud"}
        </button>
        {cfConfigured&&<>
          <button className="btn-primary" style={{...s.btn("secondary"),marginBottom:8,
            opacity:cfSyncing?.5:1}}
            onClick={!cfSyncing?onSyncCF:undefined}>
            {cfSyncing?"⟳ Sincronizzazione…":"⟳ Sincronizza ora"}
          </button>
          <button className="btn-ghost" style={s.btn("danger")} onClick={onDisconnectCF}>
            Disconnetti
          </button>
        </>}
      </div>
 
      {/* ── API KEY ── */}
      <div style={{...s.card,marginBottom:14}}>
        <p style={{...s.label,marginBottom:8}}>Anthropic API Key</p>
        <p style={{fontSize:13,color:C.muted,marginBottom:14,fontFamily:"'DM Mono',monospace",fontWeight:"500"}}>
          {apiKey?apiKey.slice(0,14)+"••••••••":"Non configurata"}
        </p>
        <button className="btn-ghost" style={s.btn("danger")} onClick={onResetApiKey}>
          Reimposta API Key
        </button>
      </div>
 
      <div style={{background:C.greenLight,borderRadius:16,padding:"14px 16px",
        border:`1px solid ${C.green}20`}}>
        <p style={{fontSize:11,color:C.greenMid,lineHeight:1.9,margin:0}}>
          <strong>Come funziona il Cloud sync</strong><br/>
          I dati sono salvati su Cloudflare Workers KV e condivisi tra tutti
          i dispositivi che conoscono la password. Nessun login richiesto.
          I dati sono accessibili da qualsiasi dispositivo con la stessa password.
        </p>
      </div>
    </>
  );
}
 
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
