/* ─────────────────────────────────────────────────────────────────────────────
   GOOGLE DRIVE SERVICE
───────────────────────────────────────────────────────────────────────────── */
class DriveService{
  constructor(){
    this.tokenClient=null;
    this.accessToken=null;
    this.folderId=null;
    this.dataFileId=null;
    this.onTokenChange=null;
    this.tokenExpiresAt=0;
  }

  init(onTokenChange){
    this.onTokenChange=onTokenChange;
    if(typeof google==="undefined")return;
    this.tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:CLIENT_ID,
      scope:SCOPES,
      callback:resp=>{
        if(resp.error){console.error("Drive auth error:",resp);return;}
        this.accessToken=resp.access_token;
        this.tokenExpiresAt=Date.now()+3500*1000;
        LS.set(KEY_DRIVE_CONNECTED,"1");
        if(this.onTokenChange)this.onTokenChange(true);
      }
    });
  }

  get connected(){return!!this.accessToken&&Date.now()<this.tokenExpiresAt;}

  requestAuth(silent=false){
    if(!this.tokenClient)return;
    this.tokenClient.requestAccessToken({prompt:silent?"":"select_account"});
  }

  async fetch(url,opts={}){
    if(!this.connected)throw new Error("Non connesso a Drive");
    const res=await fetch(url,{...opts,headers:{Authorization:`Bearer ${this.accessToken}`,...(opts.headers||{})}});
    if(res.status===401){this.accessToken=null;if(this.onTokenChange)this.onTokenChange(false);throw new Error("Token scaduto — riconnetti Drive");}
    return res;
  }

  async getOrCreateFolder(){
    if(this.folderId)return this.folderId;
    const q=encodeURIComponent(`name='${DRIVE_FOLDER}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    const res=await this.fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
    const data=await res.json();
    if(data.files?.length){this.folderId=data.files[0].id;return this.folderId;}
    const cr=await this.fetch("https://www.googleapis.com/drive/v3/files",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name:DRIVE_FOLDER,mimeType:"application/vnd.google-apps.folder"})
    });
    const folder=await cr.json();
    this.folderId=folder.id;
    return this.folderId;
  }

  async saveExpenses(expenses){
    const fId=await this.getOrCreateFolder();
    const blob=new Blob([JSON.stringify(expenses)],{type:"application/json"});
    if(this.dataFileId){
      await this.fetch(`https://www.googleapis.com/upload/drive/v3/files/${this.dataFileId}?uploadType=media`,{
        method:"PATCH",headers:{"Content-Type":"application/json"},body:blob
      });
    }else{
      const meta={name:DATA_FILE,parents:[fId]};
      const form=new FormData();
      form.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}));
      form.append("file",blob);
      const res=await this.fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",{method:"POST",body:form});
      const f=await res.json();
      this.dataFileId=f.id;
    }
  }

  async loadExpenses(){
    const fId=await this.getOrCreateFolder();
    const q=encodeURIComponent(`name='${DATA_FILE}' and '${fId}' in parents and trashed=false`);
    const res=await this.fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
    const data=await res.json();
    if(!data.files?.length)return[];
    this.dataFileId=data.files[0].id;
    const content=await this.fetch(`https://www.googleapis.com/drive/v3/files/${this.dataFileId}?alt=media`);
    return await content.json();
  }

  async saveDocument(expId,fileData){
    const fId=await this.getOrCreateFolder();
    const ext=fileData.isPdf?"pdf":"jpg";
    const name=`doc_${expId}.${ext}`;
    const bytes=atob(fileData.base64);
    const arr=new Uint8Array(bytes.length);
    for(let i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);
    const blob=new Blob([arr],{type:fileData.mediaType});
    const meta={name,parents:[fId]};
    const form=new FormData();
    form.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}));
    form.append("file",blob);
    const res=await this.fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",{method:"POST",body:form});
    return await res.json();
  }

  async deleteDocument(expId){
    const fId=await this.getOrCreateFolder();
    for(const ext of["jpg","pdf"]){
      const name=`doc_${expId}.${ext}`;
      const q=encodeURIComponent(`name='${name}' and '${fId}' in parents and trashed=false`);
      const res=await this.fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id)`);
      const data=await res.json();
      for(const f of(data.files||[])){
        await this.fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`,{method:"DELETE"});
      }
    }
  }

  async getDocumentUrl(expId,isPdf){
    const fId=await this.getOrCreateFolder();
    const ext=isPdf?"pdf":"jpg";
    const name=`doc_${expId}.${ext}`;
    const q=encodeURIComponent(`name='${name}' and '${fId}' in parents and trashed=false`);
    const res=await this.fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,webContentLink)`);
    const data=await res.json();
    if(!data.files?.length)return null;
    // Download content
    const content=await this.fetch(`https://www.googleapis.com/drive/v3/files/${data.files[0].id}?alt=media`);
    const arrayBuffer=await content.arrayBuffer();
    const bytes=new Uint8Array(arrayBuffer);
    let binary="";
    for(let i=0;i<bytes.length;i++)binary+=String.fromCharCode(bytes[i]);
    const b64=btoa(binary);
    return{base64:b64,mediaType:isPdf?"application/pdf":"image/jpeg",isPdf};
  }

  disconnect(){
    this.accessToken=null;this.folderId=null;this.dataFileId=null;
    this.tokenExpiresAt=0;
    LS.del(KEY_DRIVE_CONNECTED);
    if(this.onTokenChange)this.onTokenChange(false);
  }
}

/* ─────────────────────────────────────────────────────────────────────────────
   CLAUDE API
───────────────────────────────────────────────────────────────────────────── */
async function analyzeFile(base64,mediaType,apiKey){
  const isPdf=mediaType==="application/pdf";
  const block=isPdf
    ?{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}}
    :{type:"image",source:{type:"base64",media_type:mediaType,data:base64}};
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-opus-4-5",max_tokens:800,messages:[{role:"user",content:[
      block,
      {type:"text",text:`Analizza questo documento italiano (ricevuta/scontrino/fattura).
Rispondi SOLO con JSON valido, niente markdown:
{"beneficiario":"nome esercente/struttura","importo":0.00,"data":"YYYY-MM-DD","descrizione":"max 60 car","categoria":"salute|casa|istruzione|famiglia|veterinaria|erogazioni"}
Categorie: salute=farmaci/visite/ticket/occhiali, casa=affitto/mutuo/ristrutturazione, istruzione=scuole/università/sport, famiglia=assicurazioni/contributi/funebri, veterinaria=cure animali, erogazioni=onlus/donazioni.
Se non leggibile usa null per stringhe e 0 per importo.`}
    ]}]})
  });
  if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"Errore API");}
  const data=await res.json();
  const txt=data.content?.find(b=>b.type==="text")?.text||"{}";
  return JSON.parse(txt.replace(/```json|```/g,"").trim());
}

function exportExcel(expenses,year){
  const rows=expenses.map(e=>({
    "Data":fmtDate(e.data),"Beneficiario":e.beneficiario,"Descrizione":e.descrizione,
    "Categoria":catLabel(e.categoria),"Pagante":e.pagante,"Per chi":e.riferimento||e.pagante,
    "Tipo doc.":e.docType==="application/pdf"?"PDF":e.hasDoc?"Immagine":"—",
    "Importo €":Number(e.importo)
  }));
  const summary=CATS.map(c=>({
    "Categoria":catLabel(c.id),
    "N.":expenses.filter(e=>e.categoria===c.id).length,
    "Totale €":expenses.filter(e=>e.categoria===c.id).reduce((s,e)=>s+Number(e.importo),0)
  }));
  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.json_to_sheet(rows);
  const ws2=XLSX.utils.json_to_sheet(summary);
  ws1["!cols"]=[12,28,35,20,12,10,12].map(w=>({wch:w}));
  ws2["!cols"]=[28,6,12].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb,ws1,`Spese ${year}`);
  XLSX.utils.book_append_sheet(wb,ws2,"Riepilogo");
  XLSX.writeFile(wb,`SpeseFiscali_${year}.xlsx`);
}

function exportPDF(expenses,year){
  const byCat={};
  CATS.forEach(c=>{byCat[c.id]=expenses.filter(e=>e.categoria===c.id);});
  const totale=expenses.reduce((s,e)=>s+Number(e.importo),0);
  const sections=CATS.map(c=>{
    if(!byCat[c.id].length)return"";
    const tot=byCat[c.id].reduce((s,e)=>s+Number(e.importo),0);
    const rows=byCat[c.id].map(e=>`<tr><td>${fmtDate(e.data)}</td><td>${e.beneficiario||"—"}</td><td>${e.descrizione||"—"}</td><td>${e.pagante}</td><td>${e.riferimento||e.pagante}</td><td style="text-align:right;font-weight:600">${fmt(e.importo)}</td></tr>`).join("");
    return`<div class="sec"><h3>${c.icon} ${c.label}</h3><table><thead><tr><th>Data</th><th>Beneficiario</th><th>Descrizione</th><th>Pagante</th><th>Per chi</th><th>Importo</th></tr></thead><tbody>${rows}</tbody><tfoot><tr><td colspan="5" style="text-align:right;font-weight:700">Totale</td><td style="text-align:right;font-weight:700">${fmt(tot)}</td></tr></tfoot></table></div>`;
  }).join("");
  const html=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Spese Fiscali ${year}</title><style>body{font-family:Georgia,serif;max-width:960px;margin:40px auto;color:#1a2a1e}h1{font-size:26px;border-bottom:2px solid #1a2a1e;padding-bottom:8px}h2{font-size:12px;color:#666;font-weight:normal;letter-spacing:.1em;text-transform:uppercase}h3{font-size:15px;margin:28px 0 6px}table{width:100%;border-collapse:collapse;font-size:12px}th{text-align:left;padding:6px 8px;background:#f0ead8;border-bottom:2px solid #1a2a1e;font-size:10px;letter-spacing:.08em;text-transform:uppercase}td{padding:6px 8px;border-bottom:1px solid #ddd}tfoot td{background:#f8f5ef;font-size:13px}.sec{page-break-inside:avoid}.summary{margin-top:40px;border-top:2px solid #1a2a1e;padding-top:20px}.total{font-size:18px;font-weight:700;text-align:right}@media print{body{margin:20px}}</style></head><body><h1>Archivio Spese Fiscali — ${year}</h1><h2>Famiglia: ${FAMILY.join(" · ")} · ${new Date().toLocaleDateString("it-IT")}</h2>${sections}<div class="summary"><h3>Riepilogo</h3><table><thead><tr><th>Categoria</th><th>N.</th><th style="text-align:right">Totale</th></tr></thead><tbody>${CATS.map(c=>`<tr><td>${c.icon} ${c.label}</td><td>${byCat[c.id].length}</td><td style="text-align:right">${fmt(byCat[c.id].reduce((s,e)=>s+Number(e.importo),0))}</td></tr>`).join("")}</tbody></table><p class="total">TOTALE: ${fmt(totale)}</p></div></body></html>`;
  const w=window.open("","_blank");
  w.document.write(html);w.document.close();
  setTimeout(()=>w.print(),600);
}

  const fileRef=useRef();
  const payers=PAYERS;
  const curYear=new Date().getFullYear().toString();

  const showToast=useCallback((msg,type="ok")=>{
    setToast({msg,type});setTimeout(()=>setToast(null),3000);
  },[]);

  /* ── Init Drive ── */
  useEffect(()=>{
    const check=()=>{
      if(typeof google!=="undefined"){
        drive.init(connected=>{
          setDriveConnected(connected);
          if(connected&&LS.get(KEY_DRIVE_CONNECTED)){
            syncFromDrive();
          }
        });
        // Auto-reconnect if was previously connected
        if(LS.get(KEY_DRIVE_CONNECTED)){
          drive.requestAuth(true);
        }
      }else{
        setTimeout(check,300);
      }
    };
    check();
  },[]);

  /* ── Load local data ── */
  useEffect(()=>{
    const res=LS.get(KEY_LS);
    if(res?.value)try{setExpenses(JSON.parse(res.value));}catch{}
    setLoading(false);
  },[]);

  const syncFromDrive=async()=>{
    setDriveSyncing(true);
    try{
      const data=await drive.loadExpenses();
      if(data.length>0){
        setExpenses(data);
        LS.set(KEY_LS,JSON.stringify(data));
        showToast(`Drive: ${data.length} spese caricate`,"info");
      }
    }catch(e){
      showToast("Errore sync Drive: "+e.message,"err");
    }finally{
      setDriveSyncing(false);
    }
  };

  const persistExpenses=async(list)=>{
    LS.set(KEY_LS,JSON.stringify(list));
    if(driveConnected){
      setDriveSyncing(true);
      try{await drive.saveExpenses(list);}
      catch(e){showToast("Drive sync fallita: "+e.message,"err");}
      finally{setDriveSyncing(false);}
    }
  };

  /* ── File capture ── */
  const handleFile=async e=>{
    const file=e.target.files[0];if(!file)return;
    const isPdf=file.type==="application/pdf";
    const base64=await toBase64(file);
    const dataUrl=isPdf?null:await toDataUrl(file);
    setFileData({base64,mediaType:file.type,dataUrl,isPdf});
    setStep("preview");e.target.value="";
  };

  const analyze=async()=>{
    setStep("loading");setErr(null);
    try{
      const r=await analyzeFile(fileData.base64,fileData.mediaType,apiKey);
      setForm({beneficiario:r.beneficiario||"",importo:r.importo??"",
        data:r.data||new Date().toISOString().slice(0,10),
        descrizione:r.descrizione||"",categoria:r.categoria||"salute",
        pagante:PAYERS[0],riferimento:FAMILY[0]});
      setStep("review");
    }catch(e){
      setErr("Errore AI: "+e.message);
      setForm({beneficiario:"",importo:"",data:new Date().toISOString().slice(0,10),
        descrizione:"",categoria:"salute",pagante:PAYERS[0],riferimento:FAMILY[0]});
      setStep("review");
    }
  };

  const saveExpense=async()=>{
    if(!form.beneficiario||!form.importo)return;
    const id=Date.now();
    const newExp={...form,id,docType:fileData?.mediaType||null,hasDoc:!!fileData};

    // Save doc locally always
    if(fileData){
      try{LS.set(imgKey(id),JSON.stringify({
        dataUrl:fileData.dataUrl,base64:fileData.base64,
        mediaType:fileData.mediaType,isPdf:fileData.isPdf
      }));}catch{}
    }

    const updated=[newExp,...expenses];
    setExpenses(updated);
    await persistExpenses(updated);

    // Save doc to Drive in background
    if(fileData&&driveConnected){
      drive.saveDocument(id,fileData)
        .then(()=>showToast("Spesa e allegato salvati su Drive ✓"))
        .catch(()=>showToast("Spesa salvata — allegato Drive fallito","err"));
    }else{
      showToast("Spesa salvata ✓");
    }

    setStep("idle");setFileData(null);setForm({});setPage("archivio");
  };

  const deleteExpense=async id=>{
    const updated=expenses.filter(e=>e.id!==id);
    setExpenses(updated);
    LS.del(imgKey(id));
    await persistExpenses(updated);
    if(driveConnected){drive.deleteDocument(id).catch(()=>{});}
    showToast("Spesa eliminata","err");
    setDetail(null);
  };

  /* ── Filters ── */
  const years=[...new Set(expenses.map(e=>e.data?.slice(0,4)))].filter(Boolean).sort().reverse();
  const filtered=expenses.filter(e=>{
    const y=e.data?.slice(0,4)||curYear;
    return(filterYear==="all"||y===filterYear)&&(filterCat==="all"||e.categoria===filterCat)&&(filterPayer==="all"||e.pagante===filterPayer)&&(filterRef==="all"||e.riferimento===filterRef);
  });
  const total=filtered.reduce((s,e)=>s+Number(e.importo),0);
  const totalYear=expenses.filter(e=>e.data?.startsWith(curYear)).reduce((s,e)=>s+Number(e.importo),0);

  if(!apiKey)return<SetupScreen onSave={k=>setApiKey(k)}/>;
  if(loading)return<div style={{...s.app,alignItems:"center",justifyContent:"center"}}><div style={{fontSize:40,animation:"spin 1.5s linear infinite"}}>⚙️</div></div>;

  return(
    <div style={s.app}>
      {toast&&<div style={s.toast(toast.type)}>{toast.msg}</div>}

      {/* Header */}
      <div style={s.header}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <h1 style={{fontFamily:"Georgia,serif",fontWeight:400,fontSize:19,letterSpacing:"0.04em",color:C.cream,margin:0}}>SpeseFiscali</h1>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:3}}>
              <span style={{...s.label,margin:0,color:C.muted}}>Dichiarazione redditi</span>
              <span style={{fontSize:8,fontFamily:"'Courier New',monospace",
                color:driveSyncing?C.gold:driveConnected?C.success:C.muted,
                animation:driveSyncing?"pulse 1s infinite":undefined}}>
                {driveSyncing?"⟳ Drive...":driveConnected?"☁ Drive":"○ locale"}
              </span>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{...s.label,color:C.gold,marginBottom:1}}>{curYear}</div>
            <div style={{fontFamily:"'Courier New',monospace",fontSize:15,color:C.gold}}>{fmt(totalYear)}</div>
            <button onClick={()=>{setPage("impostazioni");setDetail(null);if(page!=="registra")setStep("idle");}}
              style={{fontSize:9,color:C.muted,background:"none",border:"none",cursor:"pointer",
                fontFamily:"'Courier New',monospace",marginTop:2,letterSpacing:"0.06em"}}>
              ⚙ impostazioni
            </button>
          </div>
        </div>
      </div>

      {/* Pages */}
      <div style={s.page}>

        {/* REGISTRA */}
        {page==="registra"&&<>
          {step==="idle"&&<>
            <div style={{border:`2px dashed ${C.border}`,borderRadius:14,padding:"26px 16px",
              textAlign:"center",marginBottom:14,background:C.goldFade}}>
              <div style={{fontSize:46,marginBottom:8}}>📄</div>
              <p style={{color:C.muted,fontSize:12,marginBottom:16,lineHeight:1.7}}>
                Fotografa o carica un documento<br/>
                <span style={{color:C.gold,fontFamily:"'Courier New',monospace",fontSize:11}}>Foto · PDF</span>
              </p>
              <input ref={fileRef} type="file" accept="image/*,application/pdf"
                capture="environment" style={{display:"none"}} onChange={handleFile}/>
              <button style={{...s.btn(),marginBottom:8}} onClick={()=>fileRef.current.click()}>📷 &nbsp;Scatta foto / Carica file</button>
              <button style={s.btn("ghost")} onClick={()=>{setStep("review");setFileData(null);
                setForm({beneficiario:"",importo:"",data:new Date().toISOString().slice(0,10),
                  descrizione:"",categoria:"salute",pagante:PAYERS[0],riferimento:FAMILY[0]});}}>
                ✏️ &nbsp;Inserimento manuale
              </button>
            </div>
            {expenses.length>0&&<>
              <p style={{...s.label,marginBottom:8}}>Registrate di recente</p>
              {expenses.slice(0,5).map(e=>(
                <div key={e.id} style={{...s.card,display:"flex",gap:10,alignItems:"center",cursor:"pointer"}}
                  onClick={()=>{setDetail(e.id);setPage("archivio");}}>
                  <span style={{fontSize:20}}>{catIcon(e.categoria)}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.beneficiario||"—"}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:1}}>{fmtDate(e.data)} · {e.pagante}{e.riferimento&&e.riferimento!==e.pagante&&<span style={{color:C.info}}> → {e.riferimento}</span>}{e.hasDoc&&<span style={{marginLeft:5,color:C.gold}}>{e.docType==="application/pdf"?"📄":"🖼"}</span>}</div>
                  </div>
                  <div style={{fontFamily:"'Courier New',monospace",color:C.gold,fontSize:14,whiteSpace:"nowrap"}}>{fmt(e.importo)}</div>
                </div>
              ))}
            </>}
          </>}

          {step==="preview"&&fileData&&<>
            <p style={s.label}>Documento caricato</p>
            {fileData.isPdf
              ?<div style={{...s.card,textAlign:"center",padding:"28px",marginBottom:14}}><div style={{fontSize:50,marginBottom:8}}>📄</div><p style={{color:C.gold,fontFamily:"'Courier New',monospace",fontSize:13}}>PDF pronto per analisi</p></div>
              :<img src={fileData.dataUrl} alt="receipt" style={{width:"100%",borderRadius:12,marginBottom:14,maxHeight:250,objectFit:"cover",border:`1px solid ${C.border}`}}/>
            }
            <button style={s.btn()} onClick={analyze}>✨ &nbsp;Analizza con AI</button>
            <button style={{...s.btn("ghost"),marginTop:8}} onClick={()=>{setStep("idle");setFileData(null);setErr(null);}}>Annulla</button>
          </>}

          {step==="loading"&&<div style={{textAlign:"center",padding:"70px 0"}}>
            <div style={{fontSize:40,marginBottom:16,animation:"spin 1.5s linear infinite"}}>⚙️</div>
            <p style={{color:C.muted,fontFamily:"'Courier New',monospace",fontSize:12}}>Estrazione dati in corso...</p>
          </div>}

          {step==="review"&&<ReviewForm form={form} setForm={setForm} fileData={fileData}
            payers={payers} onSave={saveExpense} err={err}
            onCancel={()=>{setStep("idle");setFileData(null);setForm({});}}/>}
        </>}

        {/* ARCHIVIO */}
        {page==="archivio"&&!detail&&<>
          <div style={{marginBottom:10}}>
            <p style={s.label}>Anno</p>
            <div>
              {[...new Set([curYear,...years])].map(y=><span key={y} style={s.chip(filterYear===y,C.gold)} onClick={()=>setFilterYear(y)}>{y}</span>)}
              <span style={s.chip(filterYear==="all",C.muted)} onClick={()=>setFilterYear("all")}>Tutti</span>
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <p style={s.label}>Categoria</p>
            <div>
              <span style={s.chip(filterCat==="all",C.muted)} onClick={()=>setFilterCat("all")}>Tutte</span>
              {CATS.map(c=><span key={c.id} style={s.chip(filterCat===c.id,c.color)} onClick={()=>setFilterCat(filterCat===c.id?"all":c.id)}>{c.icon} {c.label.split("/")[0].trim()}</span>)}
            </div>
          </div>
          <div style={{marginBottom:10}}>
            <p style={s.label}>Pagante</p>
            <div>
              <span style={s.chip(filterPayer==="all",C.muted)} onClick={()=>setFilterPayer("all")}>Tutti</span>
              {PAYERS.map(p=><span key={p} style={s.chip(filterPayer===p,C.gold)} onClick={()=>setFilterPayer(filterPayer===p?"all":p)}>{p}</span>)}
            </div>
          </div>
          <div style={{marginBottom:14}}>
            <p style={s.label}>Per chi</p>
            <div>
              <span style={s.chip(filterRef==="all",C.muted)} onClick={()=>setFilterRef("all")}>Tutti</span>
              {FAMILY.map(f=><span key={f} style={s.chip(filterRef===f,C.info)} onClick={()=>setFilterRef(filterRef===f?"all":f)}>{f}</span>)}
            </div>
          </div>
          <div style={{...s.card,background:C.goldFade,border:`1px solid ${C.gold}44`,marginBottom:14}}>
            <div style={s.row}>
              <span style={{...s.label,margin:0}}>{filtered.length} spese · {filtered.filter(e=>e.hasDoc).length} doc</span>
              <span style={{fontFamily:"'Courier New',monospace",color:C.gold,fontSize:19,fontWeight:700}}>{fmt(total)}</span>
            </div>
          </div>
          {filtered.length===0&&<p style={{textAlign:"center",color:C.muted,paddingTop:40,fontFamily:"'Courier New',monospace",fontSize:12}}>Nessuna spesa trovata</p>}
          {filtered.map(e=>(
            <div key={e.id} style={{...s.card,cursor:"pointer"}} onClick={()=>setDetail(e.id)}>
              <div style={s.row}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:20}}>{catIcon(e.categoria)}</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:600}}>{e.beneficiario||"—"}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:1}}>{fmtDate(e.data)} · {e.pagante}{e.riferimento&&e.riferimento!==e.pagante&&<span style={{color:C.info}}> → {e.riferimento}</span>}{e.hasDoc&&<span style={{marginLeft:5,color:C.gold}}>{e.docType==="application/pdf"?"📄":"🖼"}</span>}</div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontFamily:"'Courier New',monospace",color:C.gold,fontSize:15}}>{fmt(e.importo)}</div>
                  <div style={{fontSize:10,color:catColor(e.categoria),marginTop:2}}>{catLabel(e.categoria)}</div>
                </div>
              </div>
              {e.descrizione&&<p style={{fontSize:11,color:C.muted,margin:"4px 0 0",lineHeight:1.4}}>{e.descrizione}</p>}
            </div>
          ))}
        </>}

        {page==="archivio"&&detail&&(
          <DetailView expense={expenses.find(e=>e.id===detail)}
            onBack={()=>setDetail(null)} onDelete={deleteExpense} driveConnected={driveConnected}/>
        )}

        {/* ESPORTA */}
        {page==="esporta"&&<ExportPage expenses={expenses} driveConnected={driveConnected} driveSyncing={driveSyncing}/>}

        {/* IMPOSTAZIONI */}
        {page==="impostazioni"&&(
          <ImpostazioniPage
            apiKey={apiKey}
            driveConnected={driveConnected}
            driveSyncing={driveSyncing}
            onConnectDrive={()=>drive.requestAuth(false)}
            onDisconnectDrive={()=>{drive.disconnect();setDriveConnected(false);}}
            onSyncDrive={syncFromDrive}
            onResetApiKey={()=>{LS.del(KEY_APIKEY);setApiKey(null);}}
            expenseCount={expenses.length}
          />
        )}
      </div>

      {/* Nav */}
      <nav style={s.nav}>
        {[{id:"registra",icon:"📷",label:"Registra"},{id:"archivio",icon:"📋",label:"Archivio"},{id:"esporta",icon:"📤",label:"Esporta"}].map(n=>(
          <button key={n.id} style={s.navBtn(page===n.id)} onClick={()=>{
            setPage(n.id);setDetail(null);if(n.id!=="registra")setStep("idle");
          }}>
            <span style={{fontSize:18}}>{n.icon}</span>{n.label}
          </button>
        ))}
      </nav>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────────────
   DETAIL VIEW
───────────────────────────────────────────────────────────────────────────── */
function DetailView({expense,onBack,onDelete,driveConnected}){
  const[doc,setDoc]=useState(null);
  const[loadingDoc,setLoadingDoc]=useState(false);

  useEffect(()=>{
    if(!expense?.hasDoc)return;
    // Try localStorage first
    try{
      const r=LS.get(imgKey(expense.id));
      if(r?.value){setDoc(JSON.parse(r.value));return;}
    }catch{}
    // Fallback to Drive
    if(driveConnected){
      setLoadingDoc(true);
      drive.getDocumentUrl(expense.id,expense.docType==="application/pdf")
        .then(d=>{if(d)setDoc(d);})
        .catch(()=>{})
        .finally(()=>setLoadingDoc(false));
    }
  },[expense?.id,driveConnected]);

  if(!expense)return null;

  const downloadDoc=()=>{
    if(!doc)return;
    const a=document.createElement("a");
    a.href=doc.isPdf?`data:application/pdf;base64,${doc.base64}`:doc.dataUrl||`data:image/jpeg;base64,${doc.base64}`;
    a.download=`spesa_${expense.id}.${doc.isPdf?"pdf":"jpg"}`;
    a.click();
  };

  return(
    <div>
      <button style={{...s.btn("ghost"),width:"auto",padding:"8px 14px",marginBottom:14,
        display:"inline-flex",alignItems:"center",gap:6,fontSize:11}} onClick={onBack}>
        ← Indietro
      </button>
      {loadingDoc&&<div style={{...s.card,textAlign:"center",padding:"20px"}}><p style={{color:C.muted,fontSize:11}}>Caricamento da Drive...</p></div>}
      {doc&&!doc.isPdf&&(doc.dataUrl||doc.base64)&&(
        <img src={doc.dataUrl||`data:image/jpeg;base64,${doc.base64}`} alt="doc"
          style={{width:"100%",borderRadius:10,marginBottom:12,maxHeight:280,objectFit:"contain",background:"#000",border:`1px solid ${C.border}`}}/>
      )}
      {doc&&doc.isPdf&&<div style={{...s.card,textAlign:"center",padding:"24px",marginBottom:12}}>
        <div style={{fontSize:44,marginBottom:6}}>📄</div>
        <p style={{color:C.gold,fontFamily:"'Courier New',monospace",fontSize:12}}>Documento PDF</p>
      </div>}
      {expense.hasDoc&&!doc&&!loadingDoc&&<div style={{...s.card,textAlign:"center",padding:"16px",marginBottom:12}}>
        <p style={{color:C.muted,fontSize:11}}>Documento non disponibile</p>
      </div>}
      <div style={s.card}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
          <span style={{fontSize:28}}>{catIcon(expense.categoria)}</span>
          <div>
            <div style={{fontSize:16,fontWeight:600}}>{expense.beneficiario||"—"}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{catLabel(expense.categoria)}</div>
          </div>
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontFamily:"'Courier New',monospace",color:C.gold,fontSize:21,fontWeight:700}}>{fmt(expense.importo)}</div>
          </div>
        </div>
        {[["Data",fmtDate(expense.data)],["Pagante",expense.pagante],["Per chi",expense.riferimento||expense.pagante],["Descrizione",expense.descrizione||"—"]].map(([k,v])=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",paddingBottom:7,marginBottom:7,borderBottom:`1px solid ${C.border}`,alignItems:"flex-start"}}>
            <span style={{...s.label,margin:0}}>{k}</span>
            <span style={{fontSize:12,textAlign:"right",maxWidth:"60%"}}>{v}</span>
          </div>
        ))}
      </div>
      {doc&&<button style={{...s.btn("secondary"),marginBottom:8}} onClick={downloadDoc}>⬇️ &nbsp;Scarica {doc.isPdf?"PDF":"immagine"}</button>}
      <button style={{...s.btn("ghost"),color:C.danger,borderColor:C.danger+"66"}} onClick={()=>onDelete(expense.id)}>🗑 &nbsp;Elimina spesa</button>
    </div>
  );
}

/* ─────────────────────────────────────────────────────────────────────────────
   REVIEW FORM
───────────────────────────────────────────────────────────────────────────── */
function ReviewForm({form,setForm,fileData,payers,onSave,onCancel,err}){
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const valid=form.beneficiario&&form.importo&&Number(form.importo)>0;
  return(
    <>
      {err&&<div style={{background:"#c45c5c18",border:"1px solid #c45c5c44",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:11,color:"#e88a8a"}}>⚠️ {err}</div>}
      {fileData&&!fileData.isPdf&&fileData.dataUrl&&<img src={fileData.dataUrl} alt="receipt" style={{width:"100%",borderRadius:8,marginBottom:14,maxHeight:130,objectFit:"cover",opacity:.75,border:`1px solid ${C.border}`}}/>}
      {fileData?.isPdf&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"11px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>📄</span><span style={{fontSize:11,color:C.muted,fontFamily:"'Courier New',monospace"}}>PDF allegato</span></div>}
      <div style={{marginBottom:11}}><label style={s.label}>Beneficiario *</label><input style={s.input} value={form.beneficiario||""} placeholder="es. Farmacia Centrale" onChange={e=>upd("beneficiario",e.target.value)}/></div>
      <div style={{display:"flex",gap:10,marginBottom:11}}>
        <div style={{flex:1}}><label style={s.label}>Importo (€) *</label><input style={s.input} type="number" step="0.01" value={form.importo||""} placeholder="0.00" onChange={e=>upd("importo",e.target.value)}/></div>
        <div style={{flex:1}}><label style={s.label}>Data</label><input style={s.input} type="date" value={form.data||""} onChange={e=>upd("data",e.target.value)}/></div>
      </div>
      <div style={{marginBottom:11}}><label style={s.label}>Descrizione</label><input style={s.input} value={form.descrizione||""} placeholder="Breve descrizione" onChange={e=>upd("descrizione",e.target.value)}/></div>
      <div style={{marginBottom:11}}>
        <label style={s.label}>Categoria</label>
        <div>{CATS.map(c=><span key={c.id} style={s.chip(form.categoria===c.id,c.color)} onClick={()=>upd("categoria",c.id)}>{c.icon} {c.label.split(" ")[0]}</span>)}</div>
      </div>
      <div style={{marginBottom:11}}>
        <label style={s.label}>Pagante</label>
        <div style={{display:"flex",gap:8}}>
          {PAYERS.map(p=><button key={p} style={{flex:1,padding:"10px",
            border:`1px solid ${form.pagante===p?C.gold:C.border}`,borderRadius:8,
            background:form.pagante===p?C.goldFade:"transparent",
            color:form.pagante===p?C.gold:C.muted,
            fontFamily:"'Courier New',monospace",fontSize:13,cursor:"pointer",transition:"all .2s"}}
            onClick={()=>upd("pagante",p)}>{p}</button>)}
        </div>
      </div>
      <div style={{marginBottom:18}}>
        <label style={s.label}>Per chi è la spesa</label>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {FAMILY.map(f=><button key={f} style={{
            padding:"8px 14px",
            border:`1px solid ${form.riferimento===f?C.info:C.border}`,borderRadius:8,
            background:form.riferimento===f?"#7aade822":"transparent",
            color:form.riferimento===f?C.info:C.muted,
            fontFamily:"'Courier New',monospace",fontSize:12,cursor:"pointer",transition:"all .2s"}}
            onClick={()=>upd("riferimento",f)}>{f}</button>)}
        </div>
      </div>
      <button style={{...s.btn(),opacity:valid?1:.4}} onClick={valid?onSave:undefined} disabled={!valid}>✅ &nbsp;Salva spesa</button>
      <button style={{...s.btn("ghost"),marginTop:8}} onClick={onCancel}>Annulla</button>
    </>
  );
}

/* ─────────────────────────────────────────────────────────────────────────────
   EXPORT PAGE
───────────────────────────────────────────────────────────────────────────── */
function ExportPage({expenses,driveConnected,driveSyncing}){
  const curYear=new Date().getFullYear().toString();
  const years=[...new Set(expenses.map(e=>e.data?.slice(0,4)).filter(Boolean))].sort().reverse();
  const[year,setYear]=useState(years[0]||curYear);
  const byYear=expenses.filter(e=>e.data?.startsWith(year));
  const total=byYear.reduce((s,e)=>s+Number(e.importo),0);
  const missingCats=CATS.filter(c=>!byYear.some(e=>e.categoria===c.id));
  return(
    <>
      <div style={{...s.card,border:`1px solid ${driveConnected?C.success+"44":C.border}`,
        background:driveConnected?"#162a1e":C.card,marginBottom:18}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{fontSize:22}}>{driveConnected?"☁️":"💾"}</div>
          <div>
            <p style={{...s.label,color:driveConnected?C.success:C.muted,margin:"0 0 3px"}}>
              {driveConnected?driveSyncing?"Sincronizzazione Drive...":"Google Drive connesso":"Salvataggio locale"}
            </p>
            <p style={{fontSize:11,color:C.muted,margin:0,lineHeight:1.5}}>
              {driveConnected?"Dati e allegati sincronizzati su tutti i dispositivi":"Dati salvati su questo browser · connetti Drive per sync multi-dispositivo"}
            </p>
          </div>
        </div>
      </div>
      <p style={s.label}>Anno</p>
      <div style={{marginBottom:18}}>{[...new Set([curYear,...years])].map(y=><span key={y} style={s.chip(year===y,C.gold)} onClick={()=>setYear(y)}>{y}</span>)}</div>

      {/* ── Alert categorie mancanti ── */}
      {byYear.length>0&&missingCats.length>0&&(
        <div style={{background:"#2a1e0a",border:`1px solid ${C.gold}55`,borderRadius:11,
          padding:"13px 14px",marginBottom:16}}>
          <p style={{...s.label,color:C.gold,margin:"0 0 8px"}}>⚠️ Categorie senza spese — hai qualcosa da aggiungere?</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {missingCats.map(c=>(
              <span key={c.id} style={{
                display:"inline-flex",alignItems:"center",gap:5,
                padding:"5px 11px",borderRadius:20,fontSize:11,
                border:`1px solid ${c.color}55`,background:c.color+"18",
                color:c.color,fontFamily:"'Courier New',monospace"}}>
                {c.icon} {c.label}
              </span>
            ))}
          </div>
        </div>
      )}

      <div style={{...s.card,marginBottom:18}}>
        <p style={{...s.label,marginBottom:12}}>Riepilogo {year}</p>
        {CATS.map(c=>{
          const items=byYear.filter(e=>e.categoria===c.id);if(!items.length)return null;
          return<div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingBottom:8,marginBottom:8,borderBottom:`1px solid ${C.border}`}}>
            <span style={{fontSize:12}}>{c.icon} {c.label} <span style={{color:C.muted,fontSize:10}}>({items.length})</span></span>
            <span style={{fontFamily:"'Courier New',monospace",color:c.color,fontSize:13}}>{fmt(items.reduce((s,e)=>s+Number(e.importo),0))}</span>
          </div>;
        })}
        {!byYear.length&&<p style={{color:C.muted,fontSize:12,textAlign:"center"}}>Nessuna spesa per {year}</p>}
        {byYear.length>0&&<div style={{display:"flex",justifyContent:"space-between",paddingTop:4}}>
          <span style={{fontFamily:"'Courier New',monospace",fontSize:11,color:C.muted}}>{byYear.length} spese · {byYear.filter(e=>e.hasDoc).length} allegati</span>
          <span style={{fontFamily:"'Courier New',monospace",color:C.gold,fontSize:17,fontWeight:700}}>{fmt(total)}</span>
        </div>}
      </div>
      <button style={{...s.btn(),marginBottom:8,opacity:byYear.length?1:.4}} onClick={byYear.length?()=>exportExcel(byYear,year):undefined}>📊 &nbsp;Esporta Excel (.xlsx)</button>
      <button style={{...s.btn("secondary"),opacity:byYear.length?1:.4}} onClick={byYear.length?()=>exportPDF(byYear,year):undefined}>🖨️ &nbsp;Genera PDF archivio</button>
    </>
  );
}

/* ─────────────────────────────────────────────────────────────────────────────
   IMPOSTAZIONI PAGE
───────────────────────────────────────────────────────────────────────────── */
function ImpostazioniPage({apiKey,driveConnected,driveSyncing,onConnectDrive,onDisconnectDrive,onSyncDrive,onResetApiKey,expenseCount}){
  const isServed=window.location.protocol!=="file:";
  return(
    <>
      <p style={{...s.label,marginBottom:14}}>Impostazioni</p>

      {/* Drive */}
      <div style={{...s.card,marginBottom:14}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <span style={{fontSize:22}}>☁️</span>
          <div>
            <p style={{...s.label,margin:"0 0 2px",color:driveConnected?C.success:C.muted}}>
              {driveConnected?"Google Drive connesso":"Google Drive non connesso"}
            </p>
            <p style={{fontSize:10,color:C.muted,margin:0}}>{expenseCount} spese in archivio</p>
          </div>
        </div>
        {!isServed&&<div style={{background:"#2a1616",border:`1px solid ${C.danger}44`,borderRadius:8,padding:"10px 12px",marginBottom:10}}>
          <p style={{fontSize:10,color:C.danger,margin:0,lineHeight:1.6}}>
            ⚠️ Apri il file via HTTP per usare Drive.<br/>
            Terminale: <span style={{fontFamily:"'Courier New',monospace",color:C.gold}}>python3 -m http.server 8080</span>
          </p>
        </div>}
        {driveConnected
          ?<><button style={{...s.btn(),marginBottom:8,opacity:driveSyncing?.5:1}}
              onClick={!driveSyncing?onSyncDrive:undefined}>
              {driveSyncing?"⟳ Sincronizzazione...":"⟳ Sincronizza ora da Drive"}
            </button>
            <button style={{...s.btn("ghost"),color:C.danger,borderColor:C.danger+"44"}} onClick={onDisconnectDrive}>Disconnetti Drive</button></>
          :<button style={{...s.btn("google"),opacity:isServed?1:.5}} onClick={isServed?onConnectDrive:undefined}>
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Connetti Google Drive
          </button>
        }
      </div>

      {/* API Key */}
      <div style={s.card}>
        <p style={{...s.label,marginBottom:8}}>Anthropic API Key</p>
        <p style={{fontSize:12,color:C.muted,marginBottom:12,fontFamily:"'Courier New',monospace"}}>
          {apiKey?apiKey.slice(0,14)+"••••••••••••":"Non configurata"}
        </p>
        <button style={{...s.btn("ghost"),color:C.danger,borderColor:C.danger+"44"}} onClick={onResetApiKey}>
          Reimposta API Key
        </button>
      </div>

      <div style={{...s.card,marginTop:4,background:"transparent",border:`1px solid ${C.border}44`}}>
        <p style={{fontSize:10,color:C.muted,lineHeight:1.7,margin:0}}>
          <strong style={{color:C.gold}}>Come funziona il backup Drive:</strong><br/>
          I dati vengono salvati nella cartella <span style={{fontFamily:"'Courier New',monospace",color:C.cream}}>SpeseFiscali</span> nel tuo Drive.
          Il file <span style={{fontFamily:"'Courier New',monospace"}}>spesefiscali_data.json</span> contiene tutte le spese;
          ogni allegato è salvato come file separato (doc_ID.jpg/.pdf).
          Aprendo l'app su un altro dispositivo con lo stesso account Google, i dati vengono sincronizzati automaticamente.
        </p>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
